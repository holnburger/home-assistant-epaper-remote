version: '3.8'

services:
  firmware:
    build:
      context: .
      target: firmware-builder
    volumes:
      - .:/app
    command: >
      bash -c "pip install -U platformio && pio run -e m5-papers3 && while true; do
        sleep 10;
      done"
    # Note: In a real dev environment, we'd use a file watcher to trigger pio run.
    # For now, we manually run it or rely on the initial build.

  web:
    platform: linux/arm64
    build:
      context: .
      target: web-dev
    volumes:
      - ./web:/app/web
      - /app/web/node_modules
      - /app/web/.next
      # Map the build output folder for access to all binaries (bootloader, partitions, firmware)
      - ./.pio/build:/app/web/public/build:ro
    ports:
      - "3000:3000"
    depends_on:
      - firmware
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
